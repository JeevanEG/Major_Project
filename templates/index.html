<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge AI - Autonomous Learning Roadmap</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>SkillForge AI</h1>
            <p>Your Autonomous Career Growth Partner</p>
        </div>
    </header>

    <main class="container">
        <section class="card" id="input-section">
            <h2>Generate Your Learning Roadmap</h2>
            <form id="roadmap-form">
                <div class="form-group">
                    <label for="current_role">Current Role</label>
                    <input type="text" id="current_role" name="current_role" placeholder="e.g. Junior Developer" required>
                </div>
                
                <div class="form-group">
                    <label for="experience_years">Years of Experience</label>
                    <input type="number" id="experience_years" name="experience_years" min="0" step="0.5" value="1" required>
                </div>

                <div class="form-group">
                    <label for="target_role">Target Role</label>
                    <input type="text" id="target_role" name="target_role" placeholder="e.g. Software Engineer" required>
                </div>

                <div class="form-group">
                    <label for="learning_goal">Specific Learning Goal (Optional)</label>
                    <textarea id="learning_goal" name="learning_goal" placeholder="e.g. Master system design and cloud architecture"></textarea>
                </div>

                <button type="submit" id="submit-btn">Generate Roadmap</button>
            </form>
        </section>

        <section id="results-container" class="hidden">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing skills and generating roadmap...</p>
            </div>
            
            <div id="error-message" class="hidden error-card"></div>

            <div id="roadmap-results"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 SkillForge AI. Powered by LangGraph & FastAPI.</p>
        </div>
    </footer>
</body>
</html>
